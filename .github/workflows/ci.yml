name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  license-guard-backend:
    name: License guard (Python — no AGPL/SSPL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend deps + pip-licenses
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-licenses==5.0.0
      - name: Fail on AGPL/SSPL/Commons-Clause
        working-directory: backend
        run: |
          pip-licenses --format=json --with-system > /tmp/licenses.json
          python - <<'PY'
          import json, sys
          BANNED = ('AGPL', 'SSPL', 'Commons Clause')
          deps = json.load(open('/tmp/licenses.json'))
          bad = [d for d in deps if any(b in (d.get('License') or '') for b in BANNED)]
          if bad:
              print('FAIL — banned licenses found:')
              for d in bad:
                  print(f"  - {d['Name']} ({d['Version']}): {d['License']}")
              sys.exit(1)
          print(f'OK — {len(deps)} backend deps, no AGPL/SSPL/Commons-Clause')
          PY

  license-guard-frontend:
    name: License guard (npm — no AGPL/SSPL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend deps
        working-directory: frontend
        run: npm install
      - name: Fail on AGPL/SSPL
        working-directory: frontend
        run: |
          npx --yes license-checker \
            --production \
            --excludePackages 'aria-frontend' \
            --failOn 'AGPL-3.0;AGPL-3.0-only;AGPL-3.0-or-later;SSPL-1.0;Commons-Clause'

  typecheck-frontend:
    name: Typecheck frontend (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - working-directory: frontend
        run: |
          npm install
          npm run typecheck

  no-client-side-ai:
    name: Frontend AI-keys guard (Day 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid client-side AI provider SDKs and direct calls
        shell: bash
        run: |
          set -eu
          fail=0

          # ----- 1. No AI provider SDKs in package.json deps -----
          if grep -E '"(openai|@anthropic-ai|groq-sdk|@google-ai|cohere-ai)"' frontend/package.json > /dev/null; then
            echo "FAIL: AI provider SDK present in frontend/package.json"
            fail=1
          fi

          # ----- 2. No VITE_*KEY for AI providers (anon Supabase OK) -----
          forbidden_env=$(grep -REn 'VITE_(GEMINI|GROQ|OPENAI|ANTHROPIC|COHERE)[A-Z_]*' frontend/src frontend/playwright.config.ts || true)
          if [ -n "$forbidden_env" ]; then
            echo "FAIL: forbidden VITE_*_KEY references found:"
            echo "$forbidden_env"
            fail=1
          fi

          # ----- 3. No direct provider URLs -----
          forbidden_urls=$(grep -REn 'generativelanguage\.googleapis|api\.openai|api\.groq|api\.anthropic|api\.cohere' frontend/src || true)
          if [ -n "$forbidden_urls" ]; then
            echo "FAIL: direct AI provider URL in frontend/src:"
            echo "$forbidden_urls"
            fail=1
          fi

          # ----- 4. No leftover legacy files -----
          legacy=$(find frontend -name '_legacy*' -o -name '*gemini*' 2>/dev/null | grep -v node_modules || true)
          if [ -n "$legacy" ]; then
            echo "FAIL: leftover legacy file(s):"
            echo "$legacy"
            fail=1
          fi

          # ----- 5. No dangerouslySetInnerHTML on model output paths -----
          unsafe_html=$(grep -REn 'dangerouslySetInnerHTML' frontend/src || true)
          if [ -n "$unsafe_html" ]; then
            echo "FAIL: dangerouslySetInnerHTML present (Day 13 forbade it):"
            echo "$unsafe_html"
            fail=1
          fi

          if [ "$fail" = "1" ]; then exit 1; fi
          echo "OK — frontend has no client-side AI keys, no provider SDKs, no direct provider URLs."

  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff==0.7.4
      - run: ruff check backend/

  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install backend deps + dev deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run unit + contract tests
        working-directory: backend
        env:
          APP_ENV: ci
        # Excludes integration (requires real Supabase + Groq) — see
        # backend/tests/integration/conftest.py for the env gate.
        run: pytest -m 'not integration' --tb=short

  migration-safety:
    name: Migration safety (apply on shadow DB)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: shadow
          POSTGRES_DB: aria_shadow
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Install psql client
        run: |
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client
      - name: Wait for Postgres ready
        env:
          PGPASSWORD: shadow
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do sleep 1; done
      - name: Stub Supabase auth + storage schemas
        env:
          PGPASSWORD: shadow
        run: |
          psql -h localhost -U postgres -d aria_shadow \
               -v ON_ERROR_STOP=1 \
               -f infra/supabase/test_helpers/auth_stub.sql
      - name: Apply migrations in order (skip pg_cron — extension not in pgvector image)
        env:
          PGPASSWORD: shadow
        run: |
          for file in $(ls infra/supabase/migrations/*.sql | sort); do
            base=$(basename "$file")
            if [[ "$base" == *pg_cron* ]]; then
              echo "skipping $base (extension unavailable in shadow image)"
              continue
            fi
            echo "Applying $base"
            psql -h localhost -U postgres -d aria_shadow \
                 -v ON_ERROR_STOP=1 -f "$file"
          done

  sbom:
    name: SBOM (syft)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          artifact-name: aria-sbom.spdx.json
          upload-artifact: true

  e2e-and-a11y:
    name: E2E + a11y (Playwright + axe-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend deps
        working-directory: frontend
        run: npm install
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run Playwright (smoke + a11y)
        working-directory: frontend
        run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
