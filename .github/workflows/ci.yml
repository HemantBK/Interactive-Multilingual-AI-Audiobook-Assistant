name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  license-guard-backend:
    name: License guard (Python — no AGPL/SSPL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend deps + pip-licenses
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-licenses==5.0.0
      - name: Fail on AGPL/SSPL/Commons-Clause
        working-directory: backend
        run: |
          pip-licenses --format=json --with-system > /tmp/licenses.json
          python - <<'PY'
          import json, sys
          BANNED = ('AGPL', 'SSPL', 'Commons Clause')
          deps = json.load(open('/tmp/licenses.json'))
          bad = [d for d in deps if any(b in (d.get('License') or '') for b in BANNED)]
          if bad:
              print('FAIL — banned licenses found:')
              for d in bad:
                  print(f"  - {d['Name']} ({d['Version']}): {d['License']}")
              sys.exit(1)
          print(f'OK — {len(deps)} backend deps, no AGPL/SSPL/Commons-Clause')
          PY

  license-guard-frontend:
    name: License guard (npm — no AGPL/SSPL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend deps
        working-directory: frontend
        run: npm install
      - name: Fail on AGPL/SSPL
        working-directory: frontend
        run: |
          npx --yes license-checker \
            --production \
            --excludePackages 'aria-frontend' \
            --failOn 'AGPL-3.0;AGPL-3.0-only;AGPL-3.0-or-later;SSPL-1.0;Commons-Clause'

  typecheck-frontend:
    name: Typecheck frontend (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - working-directory: frontend
        run: |
          npm install
          npm run typecheck
