name: Eval (nightly)

# Build plan §8: nightly eval of retrieval / citation / faithfulness against
# the golden set. Posts the report as an artifact and fails the workflow if any
# Tier-1 SLO is missed (Day 23). Day 24 wires this into the deploy gate.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL
#   SUPABASE_SERVICE_KEY
#   GROQ_API_KEY
#   EVAL_TEST_USER_ID         — UUID of a test user in the Supabase auth schema
#   EVAL_DOC_ID_MAP           — JSON string mapping fixture path → doc id
#                                (e.g. {"fixtures/ncert.pdf":"abc-…"})

on:
  schedule:
    - cron: '30 21 * * *'   # 21:30 UTC = 03:00 IST (matches pg_cron schedule)
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  eval:
    name: Run golden-set eval
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install backend + eval deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r eval/requirements.txt

      - name: Skip when secrets are absent (allows fork PRs to pass)
        id: gate
        env:
          HAVE_SUPABASE_URL: ${{ secrets.SUPABASE_URL != '' }}
          HAVE_SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY != '' }}
          HAVE_GROQ: ${{ secrets.GROQ_API_KEY != '' }}
          HAVE_USER: ${{ secrets.EVAL_TEST_USER_ID != '' }}
          HAVE_MAP: ${{ secrets.EVAL_DOC_ID_MAP != '' }}
        run: |
          if [ "$HAVE_SUPABASE_URL" = "true" ] && [ "$HAVE_SUPABASE_SERVICE_KEY" = "true" ] \
             && [ "$HAVE_GROQ" = "true" ] && [ "$HAVE_USER" = "true" ] && [ "$HAVE_MAP" = "true" ]; then
            echo "go=true" >> $GITHUB_OUTPUT
          else
            echo "go=false" >> $GITHUB_OUTPUT
            echo "::warning::Eval skipped — required secrets are not set."
          fi

      - name: Materialise doc_id map secret
        if: steps.gate.outputs.go == 'true'
        run: |
          echo "${{ secrets.EVAL_DOC_ID_MAP }}" > /tmp/doc_id_by_path.json

      - name: Download last green baseline (for regression gate)
        if: steps.gate.outputs.go == 'true'
        uses: actions/download-artifact@v4
        with:
          name: eval-baseline
          path: /tmp/eval-baseline
        continue-on-error: true   # first-ever run has no baseline

      - name: Run eval
        if: steps.gate.outputs.go == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONPATH: backend
        run: |
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p eval/reports
          BASELINE=""
          if [ -f /tmp/eval-baseline/baseline.json ]; then
            BASELINE="--baseline /tmp/eval-baseline/baseline.json"
          fi
          python -m eval.runners.cli \
            --dataset eval/datasets/golden_set.json \
            --map /tmp/doc_id_by_path.json \
            --user-id "${{ secrets.EVAL_TEST_USER_ID }}" \
            --out "eval/reports/${DATE}.json" \
            $BASELINE

      - name: Upload dated report
        if: steps.gate.outputs.go == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: eval/reports/*.json
          retention-days: 30

      - name: Promote to baseline (only on green run)
        if: steps.gate.outputs.go == 'true' && success()
        run: |
          DATE=$(date -u +%Y-%m-%d)
          cp "eval/reports/${DATE}.json" /tmp/baseline.json
      - name: Upload baseline
        if: steps.gate.outputs.go == 'true' && success()
        uses: actions/upload-artifact@v4
        with:
          name: eval-baseline
          path: /tmp/baseline.json
          retention-days: 90
          overwrite: true
